<div class="login-container">
  <div class="login-card">
    <h1 class="login-card__title">Imprenta</h1>
    <p class="login-card__subtitle">Inicia sesión para continuar</p>

    @if (errorMessage) {
      <div class="alert alert--error">
        {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onLogin()" class="login-form">
      <div class="form-field">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="admin@imprenta.com"
          required
          [disabled]="loading"
        />
      </div>

      <div class="form-field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
          [disabled]="loading"
        />
      </div>

      <button type="submit" class="login-form__btn" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>

    <p class="login-card__hint">
      Usuario: <strong>admin@imprenta.com</strong> / Contraseña: <strong>Admin123!</strong>
    </p>
  </div>
</div>
