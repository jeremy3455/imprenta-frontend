<div class="modal-overlay" (click)="cerrar.emit()">
  <div class="modal-dialog" (click)="$event.stopPropagation()">
    <div class="modal-dialog__header">
      <h2>{{ editando() ? 'Editar Producto' : 'Nuevo Producto' }}</h2>
      <button class="modal-dialog__close" (click)="cerrar.emit()" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="modal-dialog__body">
      <div class="form-grid">
        <div class="form-field">
          <label for="prod-nombre">Nombre *</label>
          <input
            id="prod-nombre"
            type="text"
            [(ngModel)]="nombre"
            placeholder="Nombre del producto"
          />
        </div>

        <div class="form-field">
          <label for="prod-precio">Precio Unitario *</label>
          <input
            id="prod-precio"
            type="number"
            step="0.01"
            min="0"
            [(ngModel)]="precioUnitario"
            placeholder="0.00"
          />
        </div>

        <div class="form-field form-field--full">
          <label for="prod-descripcion">Descripción</label>
          <textarea
            id="prod-descripcion"
            [(ngModel)]="descripcion"
            placeholder="Descripción opcional del producto"
            rows="3"
          ></textarea>
        </div>

        <div class="form-field form-field--full">
          <label for="prod-categoria">Categoría *</label>
          <select id="prod-categoria" [(ngModel)]="categoriaId">
            <option [value]="0">Selecciona una categoría</option>
            @for (cat of categorias(); track cat.id) {
              <option [value]="cat.id">{{ cat.nombre }}</option>
            }
          </select>
        </div>

        <div class="form-field form-field--full">
          <label class="toggle-label">
            <input type="checkbox" [(ngModel)]="esDocumentoTributario" />
            <span>¿Es documento tributario?</span>
          </label>
        </div>

        @if (esDocumentoTributario) {
          <div class="form-field form-field--full">
            <label for="prod-tipo-contribuyente">Tipo Contribuyente Aplicable</label>
            <select id="prod-tipo-contribuyente" [(ngModel)]="tipoContribuyenteAplicable">
              <option value="">Todos los tipos</option>
              <option value="PERSONA NATURAL">Persona Natural</option>
              <option value="SOCIEDAD">Sociedad</option>
              <option value="RISE">RISE</option>
              <option value="PUBLICA">Pública</option>
            </select>
          </div>
        }
      </div>
    </div>

    <div class="modal-dialog__footer">
      <button class="btn btn--secondary" (click)="cerrar.emit()" type="button">Cancelar</button>
      <button class="btn btn--primary" (click)="guardar()" type="button">
        {{ editando() ? 'Actualizar' : 'Guardar' }}
      </button>
    </div>
  </div>
</div>
