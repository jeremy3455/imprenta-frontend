@if (visible()) {
  <div class="confirm-overlay" (click)="onCancel()">
    <div class="confirm-dialog" [class.confirm-dialog--danger]="data()?.type === 'danger'" (click)="$event.stopPropagation()" role="dialog" aria-modal="true">
      <div class="confirm-dialog__icon">
        @if (data()?.type === 'danger') {
          <svg viewBox="0 0 20 20" fill="currentColor" width="24" height="24">
            <path fill-rule="evenodd" d="M8.485 3.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.166 2.63-1.515 2.63H3.72c-1.35 0-2.188-1.463-1.515-2.63L8.485 3.495ZM10 6a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 6Zm0 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd"/>
          </svg>
        } @else {
          <svg viewBox="0 0 20 20" fill="currentColor" width="24" height="24">
            <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-7-4a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM9 9a.75.75 0 0 0 0 1.5h.253a.25.25 0 0 1 .244.304l-.459 2.066A1.75 1.75 0 0 0 10.747 15H11a.75.75 0 0 0 0-1.5h-.253a.25.25 0 0 1-.244-.304l.459-2.066A1.75 1.75 0 0 0 9.253 9H9Z" clip-rule="evenodd"/>
          </svg>
        }
      </div>
      <h3 class="confirm-dialog__title">{{ data()?.title }}</h3>
      <p class="confirm-dialog__message">{{ data()?.message }}</p>
      @if (isPrompt()) {
        <div class="confirm-dialog__input">
          <label>{{ data()?.inputLabel }}</label>
          <input
            type="text"
            [(ngModel)]="promptValue"
            [placeholder]="data()?.inputPlaceholder || ''"
            (keyup.enter)="onConfirm()"
            autofocus
          />
        </div>
      }
      <div class="confirm-dialog__actions">
        <button type="button" class="btn btn--secondary" (click)="onCancel()">{{ data()?.cancelLabel || 'Cancelar' }}</button>
        <button type="button" class="btn btn--primary" [class.btn--danger]="data()?.type === 'danger'" (click)="onConfirm()" [disabled]="isPrompt() && !promptValue().trim()">{{ data()?.confirmLabel || 'Confirmar' }}</button>
      </div>
    </div>
  </div>
}
